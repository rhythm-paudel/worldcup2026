<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="description" content="FIFA World Cup 2026 match schedule, bracket, standings, and live scores." />
  <title>World Cup 2026 — Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="site-header">
      <div class="header-glow"></div>
      <div class="header-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">26</span>
          <div>
            <h1>FIFA World Cup 2026</h1>
            <p class="brand-sub">United States · México · Canada</p>
          </div>
        </div>
        <p class="credit">
          Created by <a href="https://rhythmpaudel.com.np" target="_blank" rel="noopener">Rhythm Paudel</a>
        </p>
      </div>
    </header>

    <nav class="main-nav" aria-label="Main navigation">
      <button type="button" class="nav-tab active" data-view="matches">Matches</button>
      <button type="button" class="nav-tab" data-view="bracket">Bracket</button>
      <button type="button" class="nav-tab" data-view="standings">Standings</button>
      <button type="button" class="nav-tab" data-view="teams">Teams</button>
      <button type="button" class="nav-tab" data-view="venues">Venues</button>
    </nav>

    <div class="filters-backdrop" id="filters-backdrop" aria-hidden="true"></div>

    <div class="layout" id="layout">
      <aside class="filters-panel" id="filters-panel">
        <div class="filters-header">
          <h2>Filters</h2>
          <button type="button" class="btn-text" id="clear-filters">Clear all</button>
        </div>

        <label class="filter-field">
          <span>Search</span>
          <input type="search" id="filter-search" placeholder="Team, city, player…" autocomplete="off" />
        </label>

        <label class="filter-field">
          <span>Host country</span>
          <select id="filter-host">
            <option value="">All hosts</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Playing team</span>
          <select id="filter-team">
            <option value="">All teams</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Group</span>
          <select id="filter-group">
            <option value="">All groups</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Stage</span>
          <select id="filter-stage">
            <option value="">All stages</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Status</span>
          <select id="filter-status">
            <option value="">Any status</option>
            <option value="scheduled">Scheduled</option>
            <option value="live">Live</option>
            <option value="finished">Finished</option>
          </select>
        </label>

        <label class="filter-field">
          <span>Date</span>
          <input type="date" id="filter-date" />
        </label>

        <div class="active-filters" id="active-filters" hidden>
          <span class="active-label">Active</span>
          <div class="chip-list" id="filter-chips"></div>
        </div>
      </aside>

      <main class="content" id="main-content">
        <div class="content-toolbar">
          <p class="result-count" id="result-count">Loading…</p>
          <button type="button" class="btn-icon" id="toggle-filters" aria-label="Toggle filters">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
          </button>
        </div>
        <div id="view-root"></div>
      </main>

      <aside class="detail-panel" id="detail-panel" hidden>
        <button type="button" class="detail-close" id="close-detail" aria-label="Close panel">&times;</button>
        <div id="detail-content"></div>
      </aside>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
